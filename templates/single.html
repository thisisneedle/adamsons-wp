	<!-- wp:group {"className":"post-hero container","layout":{"type":"default"}} -->
	<div class="wp-block-group post-hero container">
		<!-- wp:post-terms {"term":"category","className":"post-hero__term"} /-->

		<!-- wp:shortcode -->[adamsons_author_name class="post-hero__author" link="1"]<!-- /wp:shortcode -->

	<!-- wp:group {"className":"container","layout":{"type":"default"}} -->
	<div class="wp-block-group container">
		<!-- wp:post-content /-->

	<!-- wp:group {"className":"alignfull"} -->
	<div class="wp-block-group author-card alignfull">

			<div class="wp-block-buttons author-card__actions">
				<!-- wp:button {"className":"btn btn--secondary"} -->
				<div class="wp-block-button btn btn--secondary"><a class="wp-block-button__link wp-element-button" href="[author_url]">See profile</a></div>

			<!-- /wp:buttons -->
